<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drug Analysis + Top 10 Records</title>

    <link rel="stylesheet" href="../css/styles.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>

<body class="drug-theme">

    <nav class="navbar">

        <div class="logo">
             TB Analytics
        </div>

        

    </nav>

    <div class="container">

        <h2>Upload CSV File</h2>

        <input type="file"
               id="csvFile"
               accept=".csv">

        <h2>Select Drug Type</h2>

        <select id="drugTypeSelect" disabled>
        </select>

        <button id="histogramButton"
                onclick="plotHistogram()"
                disabled>
            Show Histogram
        </button>

    </div>

    <div class="stats-container">

        <div class="stat-card">
            <h3>Total Records</h3>
            <p id="totalRecords">0</p>
        </div>

        <div class="stat-card">
            <h3>Drug Types</h3>
            <p id="drugTypes">0</p>
        </div>

        <div class="stat-card">
            <h3>Most Common Drug</h3>
            <p id="topDrug">-</p>
        </div>

    </div>

    <div class="chart-container">

        <div class="chart-box">
            <h2 style="color: rgb(9, 9, 10);">Histogram</h2>
            <canvas id="histogramChart"></canvas>
        </div>

        <div class="chart-box">
            <h2 style="color: rgb(9, 9, 10);">Drug Distribution (Pie Chart)</h2>
            <canvas id="pieChart"></canvas>
        </div>

    </div>

    <div class="container">

        <h2>Top 10 Rows for Selected Drug Type</h2>

        <table id="dataTable">

            <thead></thead>

            <tbody></tbody>

        </table>

    </div>

    <script src="../js/top10-analysis.js"></script>

</body>
</html>
